<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; img-src data:;" />
  <title>Sprite Preview — Codotchi</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      background: #111;
      color: #eee;
      font-family: monospace;
      font-size: 13px;
      margin: 0;
      padding: 16px;
    }

    h1 { font-size: 18px; margin: 0 0 4px; color: #39ff14; }
    .subtitle { color: #888; margin: 0 0 20px; font-size: 12px; }

    /* ── Controls bar ── */
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-bottom: 16px;
      padding: 10px 14px;
      background: #1c1c1c;
      border: 1px solid #333;
      border-radius: 6px;
    }
    .controls label { color: #aaa; margin-right: 4px; }
    .controls select,
    .controls input[type="range"] {
      background: #2a2a2a;
      color: #eee;
      border: 1px solid #444;
      border-radius: 3px;
      padding: 3px 6px;
      font-family: monospace;
      font-size: 12px;
    }
    .scale-val { color: #39ff14; min-width: 28px; display: inline-block; }

    button.save-all {
      margin-left: auto;
      background: #1a3a1a;
      color: #39ff14;
      border: 1px solid #39ff14;
      border-radius: 4px;
      padding: 5px 14px;
      font-family: monospace;
      font-size: 12px;
      cursor: pointer;
    }
    button.save-all:hover { background: #2a4a2a; }

    /* ── Stage filter tabs ── */
    .stage-tabs { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
    .stage-tab {
      background: #222; border: 1px solid #444; border-radius: 4px;
      color: #aaa; padding: 4px 12px; font-family: monospace; font-size: 12px; cursor: pointer;
    }
    .stage-tab.active { background: #1a3a1a; border-color: #39ff14; color: #39ff14; }

    /* ── Grid layout ── */
    .animal-section { margin-bottom: 32px; }
    .animal-title {
      font-size: 14px; color: #ff00ff; text-transform: uppercase;
      letter-spacing: 2px; margin: 0 0 10px;
      border-bottom: 1px solid #333; padding-bottom: 4px;
    }
    .stage-row { display: flex; flex-wrap: wrap; gap: 12px; }
    .sprite-cell { display: flex; flex-direction: column; align-items: center; gap: 5px; }
    .stage-label { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 1px; }

    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border: 1px solid #333;
      background: #0d0d0d;
      display: block;
    }

    .save-btn {
      font-size: 10px; font-family: monospace;
      background: #1a1a2e; color: #00cfff;
      border: 1px solid #004e7c; border-radius: 3px;
      padding: 2px 8px; cursor: pointer;
    }
    .save-btn:hover { background: #001f3f; }
    .divider { border: none; border-top: 1px solid #222; margin: 20px 0; }
  </style>
</head>
<body>

<h1>Sprite Preview</h1>
<p class="subtitle">All animals &times; all stages &mdash; uses the real renderSpriteGrid() for pixel-accurate output.</p>

<!-- ── Controls ── -->
<div class="controls">
  <label>Scale</label>
  <input type="range" id="scale-slider" min="1" max="12" value="6" step="1" />
  <span class="scale-val" id="scale-val">6&times;</span>

  <label style="margin-left:12px">Mood</label>
  <select id="mood-select">
    <option value="neutral" selected>Neutral</option>
    <option value="happy">Happy</option>
    <option value="sad">Sad</option>
    <option value="sick">Sick</option>
    <option value="sleeping">Sleeping</option>
  </select>

  <label style="margin-left:12px">Color</label>
  <select id="color-select">
    <option value="neon" selected>Neon</option>
    <option value="pastel">Pastel</option>
    <option value="mono">Mono</option>
    <option value="ocean">Ocean</option>
  </select>

  <label style="margin-left:12px">Weight</label>
  <input type="range" id="weight-slider" min="0" max="100" value="50" step="1" />
  <span class="scale-val" id="weight-val">50</span>

  <label style="margin-left:12px">Facing</label>
  <select id="facing-select">
    <option value="right" selected>Right</option>
    <option value="left">Left</option>
  </select>

  <label style="margin-left:12px">Animate</label>
  <select id="animate-select">
    <option value="yes" selected>Yes</option>
    <option value="no">No</option>
  </select>

  <label style="margin-left:12px">Source</label>
  <select id="source-select">
    <option value="sprites" selected>sprites.js (all stages)</option>
    <option value="sprites_adult">sprites_adult.js (adult only)</option>
  </select>

  <button class="save-all" id="btn-save-all">&#8595; Save all as PNG</button>
</div>

<!-- ── Stage filter ── -->
<div class="stage-tabs" id="stage-tabs">
  <button class="stage-tab active" data-stage="all">All stages</button>
  <button class="stage-tab" data-stage="egg">Egg</button>
  <button class="stage-tab" data-stage="baby">Baby</button>
  <button class="stage-tab" data-stage="child">Child</button>
  <button class="stage-tab" data-stage="teen">Teen</button>
  <button class="stage-tab" data-stage="adult">Adult</button>
  <button class="stage-tab" data-stage="senior">Senior</button>
</div>

<!-- ── Sprite grid (populated by JS) ── -->
<div id="grid"></div>

<!-- Load shared constants, then sprite data files -->
<script src="spriteConstants.js"></script>
<script src="sprites.js"></script>
<script src="sprites_adult.js"></script>

<script>
(function () {
  "use strict";

  // ── Config ────────────────────────────────────────────────────────────────
  var UPRIGHT_TYPES = { classic: 1, monkey: 1, rooster: 1, dragon: 1 };

  var ALL_ANIMALS = [
    "classic", "monkey", "rooster", "dragon",
    "cat", "rat", "ox", "tiger", "rabbit",
    "horse", "sheep", "dog", "pig", "snake"
  ];

  var ALL_STAGES = ["egg", "baby", "child", "teen", "adult", "senior"];

  // BASE_SIZE must match the value in sprites.js renderSpriteGrid (96).
  var BASE_SIZE = 96;

  // ── Controls state ────────────────────────────────────────────────────────
  var pixelScale   = 6;
  var activeStage  = "all";
  var activeSource = "sprites";
  var globalMood   = "neutral";
  var globalColor  = "neon";
  var globalWeight = 50;
  var facingLeft   = false;
  var animEnabled  = true;

  // ── Animation state (drives leg frames across all cells) ──────────────────
  var legFrame    = 0;       // 0 or 1 — toggles every ~250 ms
  var breathPhase = 0;       // radians — increments each frame when sleeping
  var lastFrameMs = 0;
  var legAccumMs  = 0;       // accumulated time since last leg toggle
  var LEG_PERIOD_MS = 250;   // ms per leg-step

  // ── Per-cell canvas registry ──────────────────────────────────────────────
  // Maps "<animal>_<stage>" → { canvas, ctx }
  var cells = {};

  // ── Helper: build synthetic state for renderSpriteGrid ───────────────────
  function makeState(spriteType, stage) {
    var mood = globalMood;
    return {
      spriteType: spriteType,
      stage:      stage,
      color:      globalColor,
      weight:     globalWeight,
      mood:       mood,
      sick:       mood === "sick",
      sleeping:   mood === "sleeping",
      alive:      true,
    };
  }

  // ── Canvas size for a given animal at current scale ───────────────────────
  // We want the canvas to be big enough to show the largest possible stage
  // at this animal's grid dimensions. We pad the height a little so the
  // bottom-aligned sprite is never clipped.
  function canvasSize(animal) {
    var isUpright = !!UPRIGHT_TYPES[animal];
    var COLS = isUpright ? 32 : 48;
    var ROWS = isUpright ? 48 : 32;
    // largest stage scale is 1.0 (adult/senior), medium petSize = 1.5
    var maxBodySize = Math.round(BASE_SIZE * 1.5 * 1.0);
    var wwm = window.spriteWeightWidthMult(globalWeight);
    // width: bodySize * weightMult, height: bodySize * heightMult
    var hmult = Math.max.apply(null, Object.values(window.SPRITE_BODY_HEIGHT_MULTS));
    var w = Math.ceil(maxBodySize * wwm) + 4;
    var h = Math.ceil(maxBodySize * hmult) + 4;
    return { w: w, h: h };
  }

  // ── Draw one cell ─────────────────────────────────────────────────────────
  function drawCell(animal, stage) {
    var key = animal + "_" + stage;
    var entry = cells[key];
    if (!entry) { return; }

    var canvas = entry.canvas;
    var ctx    = entry.ctx;
    var W = canvas.width;
    var H = canvas.height;

    ctx.clearRect(0, 0, W, H);

    // Draw background using the palette's background colour
    var palette = window.spriteGetPalette(globalColor);
    ctx.fillStyle = palette.background;
    ctx.fillRect(0, 0, W, H);

    // Draw floor line (subtle) matching the sidebar
    ctx.fillStyle = "rgba(255,255,255,0.08)";
    ctx.fillRect(0, H - 2, W, 1);

    var state = makeState(animal, stage);

    // Determine body dimensions matching renderSpriteGrid exactly
    var stageScale = window.SPRITE_STAGE_SCALES[stage] || 0.65;
    // petSize = medium = 1.5 (hard-coded for preview; sidebar reads from body dataset)
    var sizeMultiplier = 1.5;
    var bodySize   = Math.round(BASE_SIZE * sizeMultiplier * stageScale);
    var wwm        = window.spriteWeightWidthMult(globalWeight);
    var bodyWidth  = Math.round(bodySize * wwm);
    var hMult      = window.SPRITE_BODY_HEIGHT_MULTS[stage] || 0.67;
    var bodyHeight = Math.round(bodySize * hMult);

    // If sprites_adult source, swap in ADULT_DEFS temporarily by patching SPRITES
    var patchedSprites = false;
    if (activeSource === "sprites_adult" && stage === "adult"
        && window.ADULT_DEFS && window.ADULT_DEFS[animal]
        && window.SPRITES && window.SPRITES[animal]) {
      var origAdult = window.SPRITES[animal]["adult"];
      window.SPRITES[animal]["adult"] = window.ADULT_DEFS[animal].map(function (r) {
        return r.split("").map(Number);
      });
      patchedSprites = true;
    }

    // Centre horizontally, bottom-align vertically
    var x     = Math.max(0, Math.floor((W - bodyWidth) / 2));
    var bodyY = H - bodyHeight - 2;

    // Breath bob phase for sleeping
    var bPhase = (state.sleeping && animEnabled) ? breathPhase : 0;

    window.renderSpriteGrid(
      ctx, state, x, bodyY, facingLeft, legFrame, bPhase,
      window.SPRITE_STAGE_SCALES, window.SPRITE_BODY_HEIGHT_MULTS,
      window.spriteWeightWidthMult, window.spriteGetPalette
    );

    // Restore patched SPRITES
    if (patchedSprites) {
      window.SPRITES[animal]["adult"] = origAdult;
    }
  }

  // ── Build / rebuild the full grid ─────────────────────────────────────────
  function buildGrid() {
    cells = {};
    var container = document.getElementById("grid");
    container.innerHTML = "";

    var stagesToShow = activeStage === "all" ? ALL_STAGES : [activeStage];

    ALL_ANIMALS.forEach(function (animal) {
      var section = document.createElement("div");
      section.className = "animal-section";

      var title = document.createElement("div");
      title.className = "animal-title";
      title.textContent = animal + (UPRIGHT_TYPES[animal] ? "  [upright 32\xd748]" : "  [quadruped 48\xd732]");
      section.appendChild(title);

      var row = document.createElement("div");
      row.className = "stage-row";

      stagesToShow.forEach(function (stage) {
        // sprites_adult source only has "adult"
        if (activeSource === "sprites_adult" && stage !== "adult") { return; }

        var sz    = canvasSize(animal);
        var cell  = document.createElement("div");
        cell.className = "sprite-cell";

        var lbl = document.createElement("div");
        lbl.className = "stage-label";
        lbl.textContent = stage;
        cell.appendChild(lbl);

        var canvas = document.createElement("canvas");
        canvas.width  = sz.w;
        canvas.height = sz.h;
        canvas.title  = animal + " / " + stage;
        canvas.setAttribute("data-animal", animal);
        canvas.setAttribute("data-stage",  stage);

        var key = animal + "_" + stage;
        cells[key] = { canvas: canvas, ctx: canvas.getContext("2d") };
        drawCell(animal, stage);

        cell.appendChild(canvas);

        // Per-sprite save button
        var btn = document.createElement("button");
        btn.className = "save-btn";
        btn.textContent = "PNG";
        (function (c, a, s) {
          btn.addEventListener("click", function () {
            saveCanvas(c, a + "_" + s);
          });
        }(canvas, animal, stage));
        cell.appendChild(btn);

        row.appendChild(cell);
      });

      if (row.children.length === 0) { return; }

      section.appendChild(row);
      var hr = document.createElement("hr");
      hr.className = "divider";
      section.appendChild(hr);
      container.appendChild(section);
    });
  }

  // ── Redraw all existing cells (without full DOM rebuild) ──────────────────
  function redrawAll() {
    var keys = Object.keys(cells);
    for (var i = 0; i < keys.length; i++) {
      var parts  = keys[i].split("_");
      var animal = parts[0];
      var stage  = parts[1];
      drawCell(animal, stage);
    }
  }

  // ── rAF animation loop ────────────────────────────────────────────────────
  function tick(nowMs) {
    requestAnimationFrame(tick);

    if (!animEnabled) {
      lastFrameMs = 0;
      return;
    }

    if (!lastFrameMs) { lastFrameMs = nowMs; }
    var dt = nowMs - lastFrameMs;
    lastFrameMs = nowMs;

    // Leg toggle
    legAccumMs += dt;
    if (legAccumMs >= LEG_PERIOD_MS) {
      legAccumMs -= LEG_PERIOD_MS;
      legFrame = legFrame === 0 ? 1 : 0;
    }

    // Breath bob
    if (globalMood === "sleeping") {
      breathPhase += dt * 0.001 * Math.PI;
    } else {
      breathPhase = 0;
    }

    redrawAll();
  }
  requestAnimationFrame(tick);

  // ── Save helpers ──────────────────────────────────────────────────────────
  function saveCanvas(canvas, name) {
    var a = document.createElement("a");
    a.href     = canvas.toDataURL("image/png");
    a.download = name + "_" + pixelScale + "x.png";
    a.click();
  }

  function saveAll() {
    document.querySelectorAll("canvas[data-animal]").forEach(function (canvas) {
      var animal = canvas.getAttribute("data-animal");
      var stage  = canvas.getAttribute("data-stage");
      saveCanvas(canvas, animal + "_" + stage);
    });
  }

  // ── Event wiring ──────────────────────────────────────────────────────────
  document.getElementById("scale-slider").addEventListener("input", function () {
    pixelScale = parseInt(this.value, 10);
    document.getElementById("scale-val").textContent = pixelScale + "\xd7";
    buildGrid(); // canvas sizes depend on weight; cheapest is just rebuild
  });

  document.getElementById("mood-select").addEventListener("change", function () {
    globalMood = this.value;
    redrawAll();
  });

  document.getElementById("color-select").addEventListener("change", function () {
    globalColor = this.value;
    redrawAll();
  });

  document.getElementById("weight-slider").addEventListener("input", function () {
    globalWeight = parseInt(this.value, 10);
    document.getElementById("weight-val").textContent = globalWeight;
    buildGrid(); // canvas widths may change with weight
  });

  document.getElementById("facing-select").addEventListener("change", function () {
    facingLeft = this.value === "left";
    redrawAll();
  });

  document.getElementById("animate-select").addEventListener("change", function () {
    animEnabled = this.value === "yes";
    if (!animEnabled) {
      legFrame = 0;
      breathPhase = 0;
      redrawAll();
    }
  });

  document.getElementById("source-select").addEventListener("change", function () {
    activeSource = this.value;
    buildGrid();
  });

  document.getElementById("btn-save-all").addEventListener("click", saveAll);

  document.getElementById("stage-tabs").addEventListener("click", function (e) {
    var btn = e.target.closest(".stage-tab");
    if (!btn) { return; }
    document.querySelectorAll(".stage-tab").forEach(function (t) {
      t.classList.remove("active");
    });
    btn.classList.add("active");
    activeStage = btn.getAttribute("data-stage");
    buildGrid();
  });

  // ── Init ──────────────────────────────────────────────────────────────────
  buildGrid();

}());
</script>

</body>
</html>

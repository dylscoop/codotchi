<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor">
  <!-- Body: egg shape -->
  <ellipse cx="8" cy="9" rx="5" ry="6" />
  <!-- Eyes (cut out with background colour) -->
  <circle cx="6" cy="8" r="1" fill="var(--vscode-activityBar-background, #1e1e1e)" />
  <circle cx="10" cy="8" r="1" fill="var(--vscode-activityBar-background, #1e1e1e)" />
  <!-- Mouth: small rect for pixel feel -->
  <rect x="7" y="11" width="2" height="1"
        fill="var(--vscode-activityBar-background, #1e1e1e)" />
  <!-- Feet -->
  <rect x="5" y="15" width="2" height="1" />
  <rect x="9" y="15" width="2" height="1" />
</svg>
